name: Morning LINE Greeting

on:
  schedule:
    # 00:00 UTC == 07:00 Asia/Bangkok. GitHub cron may start a few minutes late.
    - cron: "0 0 * * *"
  workflow_dispatch: {}      # allow manual "Run workflow" for testing

permissions:
  contents: write            # needed to commit the generated image back to the repo

concurrency:
  group: morning-greeting
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate greeting image
        id: gen
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TZ: Asia/Bangkok
        run: python generate.py

      - name: Commit today's image
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images history.json assets/fonts
          git commit -m "morning: ${{ steps.gen.outputs.date }}" || echo "nothing to commit"
          git push

      - name: Send to LINE
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          IMAGE_PATH: ${{ steps.gen.outputs.image_path }}
        run: python send.py
